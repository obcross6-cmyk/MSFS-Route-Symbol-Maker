<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSFS Custom Route Maker</title>
    
    <!-- 1. Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- 2. Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Sidebar Menu -->
    <div id="sidebar">
        <h2>Route Maker</h2>
        
        <div class="control-group">
            <label for="imageUpload">1. Upload a Stencil Image</label>
            <p class="helper-text">Upload an image. Two blue markers will appear to resize it.</p>
            <input type="file" id="imageUpload" accept="image/*">
            <button id="clearImage">Remove Image</button>
        </div>

        <div class="control-group">
            <label>2. Plot Your Route</label>
            <p class="helper-text">Click the map to draw waypoints.</p>
            <button id="clearRoute">Clear Waypoints</button>
        </div>

        <div class="control-group">
            <label for="output">3. SimBrief Export</label>
            <p class="helper-text">Copy these coordinates into SimBrief.</p>
            <textarea id="output" rows="6" readonly placeholder="Coordinates will appear here..."></textarea>
            <button id="copyBtn">Copy to Clipboard</button>
        </div>
    </div>
    
    <!-- Map Container -->
    <div id="map"></div>

    <!-- 3. Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 4. Custom JS -->
    <script src="script.js"></script>

</body>
</html>
